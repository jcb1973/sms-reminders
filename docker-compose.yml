services:
  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - ./Caddyfile:/etc/caddy/Caddyfile 
      - /var/www/ble-data:/var/www/ble-data
  app:
    build: .
    init: true
    restart: always
    depends_on:
      - redis
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_TOKEN=${TWILIO_TOKEN}
      - TWILIO_NUMBER=${TWILIO_NUMBER}
      - TWILIO_CALL_NUMBER=${TWILIO_CALL_NUMBER}
      - REDIS_HOST=redis
      - WEBHOOK_URL=${WEBHOOK_URL}
      - TZ=Europe/Stockholm

  redis:
    image: redis:alpine
    restart: always

volumes:
  caddy_data:
