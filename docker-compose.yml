services:
  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - ./Caddyfile:/etc/caddy/Caddyfile 
      - /var/www/ble-data:/var/www/ble-data
      - /home/linuxuser/src/ble-gateway/web/index.html:/var/www/ble-data/index.html:ro
  app:
    build: .
    init: true
    restart: always
    depends_on:
      - redis
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_TOKEN=${TWILIO_TOKEN}
      - TWILIO_NUMBER=${TWILIO_NUMBER}
      - TWILIO_CALL_NUMBER=${TWILIO_CALL_NUMBER}
      - REDIS_HOST=redis
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      - TZ=Europe/Stockholm

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  caddy_data:
  redis_data:
