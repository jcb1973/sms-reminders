services:
  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
    command: caddy reverse-proxy --from ${DOMAIN} --to app:3000

  app:
    build: .
    init: true
    restart: always
    depends_on:
      - redis
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_TOKEN=${TWILIO_TOKEN}
      - TWILIO_NUMBER=${TWILIO_NUMBER}
      - REDIS_HOST=redis
      - WEBHOOK_URL=${WEBHOOK_URL}
      - TZ=Europe/Stockholm

  redis:
    image: redis:alpine
    restart: always

volumes:
  caddy_data:
